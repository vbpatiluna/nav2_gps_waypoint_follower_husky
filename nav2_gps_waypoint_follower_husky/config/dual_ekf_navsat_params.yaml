navsat_transform:
  ros__parameters:
    frequency: 5.0
    delay: 3.0
    magnetic_declination_radians: 0.1321        # magnetic declination (radians) at Olar Farm 
    yaw_offset: 0.0 #1.5708                     # 0.0 is the correct setting, robot orients correctly when recaching goal
    zero_altitude: true
    #broadcast_utm_transform: true
    broadcast_cartesian_transform: true
    publish_filtered_gps: true
    use_odometry_yaw: true
    wait_for_datum: false 
    #datum: [lat, lon, yaw]                     # if undeclared, navsat_transform will use automatic datum initialization